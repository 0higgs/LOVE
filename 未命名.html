<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>喜欢你呀</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #fff0f5;
            font-family: 'Microsoft YaHei', sans-serif;
            padding: 20px;
            transition: background 0.5s ease;
        }
        .container {
            text-align: center;
        }
        .question {
            font-size: 28px;
            color: #333;
            margin-bottom: 50px;
            font-weight: 500;
        }
        .buttons {
            display: flex;
            gap: 30px;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
            position: relative;
        }
        .btn {
            border: none;
            border-radius: 25px;
            color: white;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 500;
            padding: 12px 24px;
        }
        .yes-btn {
            background-color: #ff69b4;
            min-width: 100px;
            min-height: 50px;
            position: relative;
            z-index: 10; /* 保证可以按钮一直在上层 */
        }
        .no-btn {
            background-color: #1e90ff;
            position: absolute;
            z-index: 1; /* 保证不行按钮在下层 */
            left: 50%;
            transform: translateX(65%);
        }
        .success-text {
            font-size: 32px;
            color: #ff1493;
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="question" id="question">你能和我在一起吗？</div>
        <div class="buttons">
            <button class="btn yes-btn" id="yesBtn">可以</button>
            <button class="btn no-btn" id="noBtn">不行</button>
        </div>
        <div class="success-text" id="successText">谢谢宝，我也好喜欢你❤️</div>
    </div>

    <script>
        const yesBtn = document.getElementById('yesBtn');
        const noBtn = document.getElementById('noBtn');
        const question = document.getElementById('question');
        const successText = document.getElementById('successText');
        const buttonsWrap = document.querySelector('.buttons');

        // 蓝色按钮的文字变化列表
        const noTexts = [
            '别点我呀',
            '再点我就躲起来了',
            '你真的忍心吗🥺',
            '求求你选左边嘛',
            '我要生气啦！',
            '最后一次警告！',
            '你点不到我了😜'
        ];

        let clickCount = 0;
        let yesBtnWidth = 100;
        let yesBtnHeight = 50;
        let yesBtnFontSize = 18;

        noBtn.addEventListener('click', function() {
            clickCount++;
            // 让可以按钮变大
            yesBtnWidth += 40;
            yesBtnHeight += 20;
            yesBtnFontSize += 3;
            
            // 限制最大大小
            const maxWidth = window.innerWidth * 0.9;
            const maxHeight = window.innerHeight * 0.5;
            if (yesBtnWidth > maxWidth) yesBtnWidth = maxWidth;
            if (yesBtnHeight > maxHeight) yesBtnHeight = maxHeight;

            yesBtn.style.width = yesBtnWidth + 'px';
            yesBtn.style.height = yesBtnHeight + 'px';
            yesBtn.style.fontSize = yesBtnFontSize + 'px';

            // 修改蓝色按钮文字
            if (clickCount <= noTexts.length) {
                noBtn.innerText = noTexts[clickCount - 1];
            }
        });

        yesBtn.addEventListener('click', function() {
            // 点击可以后，切换到成功页面
            question.style.display = 'none';
            buttonsWrap.style.display = 'none';
            successText.style.display = 'block';
            document.body.style.background = '#ffe4e1';
        });
    </script>
</body>
</html>
